apis:
- aid: labguru:labguru-rest-api
  name: Labguru REST API
  description: RESTful API providing create, read, update, and delete access to nearly
    all data in Labguru including experiments, projects, protocols, milestones, inventory,
    equipment, measurements, samples, and research data. Supports JSON responses,
    pagination, filtering, and both v1 and v2 endpoint versions.
